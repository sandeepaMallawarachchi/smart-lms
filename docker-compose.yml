# BuildKit must be enabled for --mount=type=cache in Dockerfiles to work.
# It is on by default in Docker Desktop and Docker Engine 23+.
# If you get a "unknown flag: --mount" error, run: export DOCKER_BUILDKIT=1
services:

  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ksdk1357@A
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Version Control Service (port 8082) ──────────────────────
  version-control-service:
    build:
      context: ./backend/version_control_service
      dockerfile: Dockerfile
      no_cache: false
    pull_policy: never
    container_name: version-control-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lms_db?currentSchema=version_schema
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ksdk1357@A
      SUBMISSION_SERVICE_URL: http://submission-management-service:8081
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Submission Management Service (port 8081) ─────────────────
  submission-management-service:
    build:
      context: ./backend/submission-management-service
      dockerfile: Dockerfile
      no_cache: false
    container_name: submission-management-service
    env_file:
      - .env.backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lms_db?currentSchema=submission_schema
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ksdk1357@A
      FILE_UPLOAD_DIR: /app/uploads
      VERSION_SERVICE_URL: http://version-control-service:8082
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      version-control-service:
        condition: service_started
    restart: unless-stopped

  feedback-service:
    build:
      context: ./backend/feedback-service
      dockerfile: Dockerfile
      no_cache: false
    container_name: feedback-service
    env_file:
      - .env.backend
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lms_db?currentSchema=feedback_schema
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ksdk1357@A
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  integrity-monitoring-service:
    build:
      context: ./backend/integrity-monitoring-service
      dockerfile: Dockerfile
      no_cache: false
    container_name: integrity-monitoring-service
    env_file:
      - .env.backend
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lms_db?currentSchema=integrity_schema
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ksdk1357@A
      SUBMISSION_SERVICE_URL: http://submission-management-service:8081
    depends_on:
      postgres:
        condition: service_healthy
      submission-management-service:
        condition: service_started
    restart: unless-stopped

  learning-analytics-module:
    build:
      context: ./backend/learning-analytics-module
      dockerfile: Dockerfile
    container_name: learning-analytics-module
    env_file:
      - .env.backend
    environment:
      PORT: 5000
    ports:
      - "5000:5000"
    restart: unless-stopped

  heatmap:
    build:
      context: ./backend/heatmap
      dockerfile: Dockerfile
    container_name: heatmap
    env_file:
      - .env.backend
    environment:
      PORT: 5002
    ports:
      - "5002:5002"
    restart: unless-stopped

  chatbot:
    build:
      context: ./backend/chatbot
      dockerfile: Dockerfile
    container_name: chatbot
    env_file:
      - .env.backend
    environment:
      PORT: 5001
    ports:
      - "5001:5001"
    depends_on:
      - learning-analytics-module
      - heatmap
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
