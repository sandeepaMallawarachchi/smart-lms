spring.application.name=integrity-monitoring-service

server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/lms_db?currentSchema=integrity_schema
spring.datasource.username=postgres
spring.datasource.password=ksdk1357@A
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=integrity_schema

# Run schema-init.sql on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-init.sql

# Large Object Support
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# SerpAPI Web Search (FREE - 100 searches/month)
# Get key: https://serpapi.com → Dashboard → API Key
serp.search.enabled=true
serp.api-key=9682cb2ea9145ca97b81767b257710ad482785f7d45f17f789247980ff789550
serp.search-api-url=https://serpapi.com/search

# JPlag Configuration
jplag.temp-dir=./temp/integrity
jplag.report-dir=./reports/integrity
jplag.min-token-match=9

# Plagiarism Thresholds
# internet-similarity-threshold: minimum TF-IDF cosine sim against Google snippets to include
#   in the final score. Snippets are short (~50-150 chars) so exact copy-paste scores ~0.50-0.55.
#   Use 0.30 to catch real plagiarism without false positives from unrelated matches.
# text-similarity-threshold: final flag threshold (max of internet + peer scores).
#   0.45 = flag when clearly similar to internet source or another student's answer.
integrity.code-similarity-threshold=0.75
integrity.text-similarity-threshold=0.45
integrity.internet-similarity-threshold=0.17

# Real-time Check Configuration
integrity.realtime.enabled=true
integrity.realtime.min-text-length=50
integrity.realtime.check-interval-ms=2000

# Question Analysis (Detect if plagiarism check needed)
integrity.question-analysis.enabled=true
integrity.question-analysis.factual-question-threshold=0.8

# File Processing
integrity.max-file-size=52428800
integrity.allowed-extensions=java,py,cpp,c,js,ts,txt,pdf,docx,md

# Cache Configuration
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=1h

# Logging
logging.level.root=INFO
logging.level.com.example.integrity_monitoring_service=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Submission Management Service (for peer-comparison plagiarism)
submission-service.url=http://localhost:8081
