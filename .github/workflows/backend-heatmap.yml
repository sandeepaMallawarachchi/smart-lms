name: Heatmap Service CI

on:
  push:
    paths:
      - "backend/heatmap/**"
      - ".github/workflows/backend-heatmap.yml"
      - ".github/workflows/backend-service-ci.yml"
  pull_request:
    paths:
      - "backend/heatmap/**"
      - ".github/workflows/backend-heatmap.yml"
      - ".github/workflows/backend-service-ci.yml"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/backend-service-ci.yml
    with:
      service_name: Heatmap Service
      service_path: backend/heatmap
      runtime: python
      dockerfile_path: backend/heatmap/Dockerfile
      python_version: "3.11"
      compose_service: heatmap
      deploy_on_main: true
    secrets:
      ec2_host: ${{ secrets.EC2_HOST }}
      ec2_user: ${{ secrets.EC2_USER }}
      ec2_ssh_key: ${{ secrets.EC2_SSH_KEY }}
