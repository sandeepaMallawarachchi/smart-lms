name: Version Control Service CI

on:
  push:
    paths:
      - "backend/version_control_service/**"
      - ".github/workflows/backend-version-control.yml"
      - ".github/workflows/backend-service-ci.yml"
  pull_request:
    paths:
      - "backend/version_control_service/**"
      - ".github/workflows/backend-version-control.yml"
      - ".github/workflows/backend-service-ci.yml"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/backend-service-ci.yml
    with:
      service_name: Version Control Service
      service_path: backend/version_control_service
      runtime: java
      dockerfile_path: backend/version_control_service/Dockerfile
      java_version: "21"
      compose_service: version-control-service
      deploy_on_main: true
    secrets:
      ec2_host: ${{ secrets.EC2_HOST }}
      ec2_user: ${{ secrets.EC2_USER }}
      ec2_ssh_key: ${{ secrets.EC2_SSH_KEY }}
