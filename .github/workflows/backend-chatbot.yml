name: Chatbot Service CI

on:
  push:
    paths:
      - "backend/chatbot/**"
      - ".github/workflows/backend-chatbot.yml"
      - ".github/workflows/backend-service-ci.yml"
  pull_request:
    paths:
      - "backend/chatbot/**"
      - ".github/workflows/backend-chatbot.yml"
      - ".github/workflows/backend-service-ci.yml"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/backend-service-ci.yml
    with:
      service_name: Chatbot Service
      service_path: backend/chatbot
      runtime: python
      dockerfile_path: backend/chatbot/Dockerfile
      python_version: "3.11"
      compose_service: chatbot
      deploy_on_main: true
    secrets:
      ec2_host: ${{ secrets.EC2_HOST }}
      ec2_user: ${{ secrets.EC2_USER }}
      ec2_ssh_key: ${{ secrets.EC2_SSH_KEY }}
