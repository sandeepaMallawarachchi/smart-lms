name: Learning Analytics Service CI

on:
  push:
    paths:
      - "backend/learning-analytics-module/**"
      - ".github/workflows/backend-learning-analytics.yml"
      - ".github/workflows/backend-service-ci.yml"
  pull_request:
    paths:
      - "backend/learning-analytics-module/**"
      - ".github/workflows/backend-learning-analytics.yml"
      - ".github/workflows/backend-service-ci.yml"
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/backend-service-ci.yml
    with:
      service_name: Learning Analytics Service
      service_path: backend/learning-analytics-module
      runtime: python
      dockerfile_path: backend/learning-analytics-module/Dockerfile
      python_version: "3.11"
      compose_service: learning-analytics-module
      deploy_on_main: true
    secrets:
      ec2_host: ${{ secrets.EC2_HOST }}
      ec2_user: ${{ secrets.EC2_USER }}
      ec2_ssh_key: ${{ secrets.EC2_SSH_KEY }}
